[tools]
"aqua:go-task/task" = "latest"
node = "20.20.2"
python = "3.12"
"npm:@4ier/notion-cli" = "latest"
"npm:@mariozechner/pi-coding-agent" = "latest"
"npm:bash-language-server" = "latest"
"npm:dockerfile-language-server-nodejs" = "latest"
"npm:neovim" = "latest"
"npm:npm" = "latest"
"npm:npm-check-updates" = "latest"
"npm:serverless" = "latest"
"npm:vim-language-server" = "latest"
"npm:yaml-language-server" = "latest"

[settings]
idiomatic_version_file_enable_tools = ["python"]
experimental = true

[settings.python]
default_packages_file = "~/.default-python-packages"
uv_venv_auto = true

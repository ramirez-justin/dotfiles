[tools]
python = "3.12"
bun = "latest"

[tasks.bootstrap]
description = "Full machine setup (after 1Password is authenticated)"
depends = [
  "brew-install",
  "tools-install",
  "install-omz",
  "link",
  "inject-secrets",
]

[tasks.brew-install]
description = "Install all packages from Brewfile"
run = "brew bundle --file={{config_root}}/Brewfile"

[tasks.tools-install]
description = "Install mise-managed tools"
run = "mise install"

[tasks.doctor]
description = "Verify dotfiles, shell tools, Pi, and local machine health"
run = """
set -e
cd {{config_root}}

check() {
    printf "%-34s" "$1"
    shift
    if "$@" >/tmp/dotfiles-doctor.out 2>&1; then
        echo " ok"
    else
        echo " failed"
        sed 's/^/  /' /tmp/dotfiles-doctor.out
        exit 1
    fi
}

check "brew bundle" brew bundle check --file={{config_root}}/Brewfile
check "stow available" command -v stow
check "mise available" command -v mise
check "mise tools installed" mise current
check "node version is 20.20.2" sh -c '[ "$(node -v)" = "v20.20.2" ]'
check "node ABI is 115" sh -c '[ "$(node -p process.versions.modules)" = "115" ]'
check "pi available" command -v pi
check "pi starts offline" pi --offline --list-models
check "git submodules initialized" git submodule status --recursive
check "zsh config linked" sh -c '[ -L "$HOME/.zshrc" ]'
check "mise config linked" sh -c '[ -L "$HOME/.config/mise/config.toml" ]'

if [ -f "$HOME/.pi/agent/env.local.zsh" ]; then
    check "pi env.local permissions" sh -c '[ "$(stat -f %Lp "$HOME/.pi/agent/env.local.zsh")" = "600" ]'
fi

echo "dotfiles doctor passed"
"""

[tasks.install-omz]
description = "Install oh-my-zsh and third-party custom plugins (alias-tips, zsh-completions)"
depends = ["brew-install"]
run = """
set -e
ZSH_DIR="${ZSH:-$HOME/.oh-my-zsh}"
if [ ! -d "$ZSH_DIR" ]; then
    echo "Installing oh-my-zsh into $ZSH_DIR..."
    RUNZSH=no CHSH=no KEEP_ZSHRC=yes sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
else
    echo "oh-my-zsh already present at $ZSH_DIR"
fi
ZSH_CUSTOM_DIR="${ZSH_CUSTOM:-$ZSH_DIR/custom}"
for repo in djui/alias-tips zsh-users/zsh-completions; do
    name="${repo##*/}"
    dest="$ZSH_CUSTOM_DIR/plugins/$name"
    if [ ! -d "$dest" ]; then
        echo "Cloning $repo -> $dest"
        git clone --depth=1 "https://github.com/$repo" "$dest"
    else
        echo "Plugin $name already present"
    fi
done
echo "oh-my-zsh ready"
"""

[tasks.link]
description = "Stow all topics into $HOME"
depends = ["brew-install"]
run = "stow --dir={{config_root}} --target=$HOME --restow zsh nvim tmux ghostty gh-dash gh git mise claude pi eza marimo aws lazygit rectangle sofia"

[tasks.unlink]
description = "Remove all stow symlinks"
run = "stow --dir={{config_root}} --target=$HOME --delete zsh nvim tmux ghostty gh-dash gh git mise claude pi eza marimo aws lazygit rectangle sofia"

[tasks.update]
description = "Pull latest dotfiles and re-link"
run = "git -C {{config_root}} pull --rebase && mise run link"

[tasks.pi-update]
description = "Update Pi packages/extensions"
run = "pi update --extensions"

[tasks.brew-dump]
description = "Regenerate Brewfile (review and curate after running)"
run = "brew bundle dump --force --file={{config_root}}/Brewfile"

[tasks.submodule-update]
description = "Pull latest commits for all submodules (nvim, eza-themes)"
run = "git -C {{config_root}} submodule update --remote --merge"

[tasks.nvim-update]
description = "Update nvim to latest and commit the pointer"
run = """
  git -C {{config_root}} submodule update --remote --merge nvim/.config/nvim
  git -C {{config_root}} add nvim/.config/nvim
  git -C {{config_root}} commit -m "chore: update nvim to latest"
"""

[tasks.inject-secrets]
description = "Write 1Password secrets into local-only tool env files"
depends = ["brew-install"]
run = """
set -e

read_secret_ref() {
    ref_value="$1"
    if [ -n "$ref_value" ]; then
        op read "$ref_value"
    fi
}

read_optional_secret() {
    ref_var="$1"
    ref_value=$(printenv "$ref_var" || true)
    read_secret_ref "$ref_value"
}

OBSIDIAN_API_KEY_OP_REF="${OBSIDIAN_API_KEY_OP_REF:-op://dev_vault/obsidian_local_rest_api_key/add more/API Key}"
OBSIDIAN_API_CERT_ITEM="${OBSIDIAN_API_CERT_ITEM:-obsidian_local_rest_api_cert}"
OBSIDIAN_API_CERT_VAULT="${OBSIDIAN_API_CERT_VAULT:-dev_vault}"
OBSIDIAN_API_KEY=$(read_secret_ref "$OBSIDIAN_API_KEY_OP_REF")
OPENAI_API_KEY=$(read_optional_secret OPENAI_API_KEY_OP_REF)
ANTHROPIC_API_KEY=$(read_optional_secret ANTHROPIC_API_KEY_OP_REF)
GEMINI_API_KEY=$(read_optional_secret GEMINI_API_KEY_OP_REF)

mkdir -p "$HOME/.config/sofia"
op document get "$OBSIDIAN_API_CERT_ITEM" --vault "$OBSIDIAN_API_CERT_VAULT" --out-file "$HOME/.config/sofia/cert.pem"
chmod 600 "$HOME/.config/sofia/cert.pem"

mkdir -p "$HOME/.pi/agent"
export OBSIDIAN_API_KEY OPENAI_API_KEY ANTHROPIC_API_KEY GEMINI_API_KEY
python3 <<'PY' > "$HOME/.pi/agent/env.local.zsh"
import os
import shlex

values = {
    "OBSIDIAN_API_KEY": os.environ.get("OBSIDIAN_API_KEY", ""),
    "OPENAI_API_KEY": os.environ.get("OPENAI_API_KEY", ""),
    "ANTHROPIC_API_KEY": os.environ.get("ANTHROPIC_API_KEY", ""),
    "GEMINI_API_KEY": os.environ.get("GEMINI_API_KEY", ""),
}

print("# Generated by `mise run inject-secrets`. Do not commit.")
for key, value in values.items():
    if value:
        print(f"export {key}={shlex.quote(value)}")
PY
chmod 600 "$HOME/.pi/agent/env.local.zsh"

echo "Local secret env files written with 0600 permissions"
"""

[tasks.gcloud-install]
description = "Install or update Google Cloud SDK at ~/google-cloud-sdk (decoupled from Homebrew python)"
run = """
set -e
INSTALL_DIR="$HOME/google-cloud-sdk"
if [ -d "$INSTALL_DIR" ]; then
    echo "Updating existing gcloud SDK at $INSTALL_DIR..."
    "$INSTALL_DIR/bin/gcloud" components update --quiet
else
    echo "Installing gcloud SDK to $INSTALL_DIR..."
    TMPDIR=$(mktemp -d)
    TARBALL="$TMPDIR/gcloud.tar.gz"
    curl -fsSL "https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/google-cloud-cli-darwin-arm.tar.gz" -o "$TARBALL"
    tar xzf "$TARBALL" -C "$HOME"
    rm -rf "$TMPDIR"
    "$INSTALL_DIR/install.sh" --quiet --usage-reporting=false --rc-path=/dev/null --command-completion=false --path-update=false
fi
"$INSTALL_DIR/bin/gcloud" components install gke-gcloud-auth-plugin --quiet
echo "gcloud installed/updated at $INSTALL_DIR"
echo "PATH and completion will load on new shells via aliases.zsh"
"""

[tasks."sofia-cloud:test"]
description = "Run SOFIA cloud Edge Function tests"
run = "cd {{config_root}}/sofia/cloud/supabase/functions/sofia-core && deno test"

[tasks."sofia-cloud:check"]
description = "Type-check SOFIA cloud Edge Function entrypoint"
run = "cd {{config_root}}/sofia/cloud/supabase/functions/sofia-core && deno check index.ts"

[tasks."sofia-cloud:deploy"]
description = "Deploy SOFIA cloud Edge Function to Supabase"
run = """
set -e
project_ref="${SUPABASE_SOFIA_PROJECT_REF:-$(op read 'op://dev_vault/Supabase SOFIA/project id')}"
supabase functions deploy sofia-core \
  --workdir {{config_root}}/sofia/cloud \
  --no-verify-jwt \
  --project-ref "$project_ref"
"""

[tasks."sofia-cloud:functions-list"]
description = "List deployed SOFIA Supabase Edge Functions"
run = """
set -e
project_ref="${SUPABASE_SOFIA_PROJECT_REF:-$(op read 'op://dev_vault/Supabase SOFIA/project id')}"
supabase functions list \
  --workdir {{config_root}}/sofia/cloud \
  --project-ref "$project_ref"
"""

[tasks."sofia-local:init"]
description = "Legacy local SOFIA bootstrap (transitional until cloud replaces local runtime)"
run = """
set -e
cd ~/.local/share/sofia/src
uv sync
~/.local/bin/sofia init
mkdir -p ~/.local/state/sofia
launchctl bootstrap gui/$UID ~/Library/LaunchAgents/com.sofia.indexer.plist || true
launchctl enable gui/$UID/com.sofia.indexer || true
echo "SOFIA local runtime bootstrapped. Next: open Claude Code in ~/dev/SOFIA and run /sofia-init"
"""

[tasks."sofia-local:status"]
description = "Legacy local SOFIA health check"
run = "~/.local/bin/sofia doctor"

[tasks."sofia-local:reindex"]
description = "Legacy local SOFIA search index rebuild"
run = "~/.local/bin/sofia index --rebuild"

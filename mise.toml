[tools]
python = "3.12"
bun = "latest"

[tasks.bootstrap]
description = "Full machine setup (after 1Password is authenticated)"
depends = [
  "brew-install",
  "tools-install",
  "install-omz",
  "link",
  "inject-secrets",
]

[tasks.brew-install]
description = "Install all packages from Brewfile"
run = "brew bundle --file={{config_root}}/Brewfile"

[tasks.tools-install]
description = "Install mise-managed tools"
run = "mise install"

[tasks.doctor]
description = "Verify dotfiles, shell tools, Pi, and local machine health"
run = """
set -e
cd {{config_root}}

check() {
    printf "%-34s" "$1"
    shift
    if "$@" >/tmp/dotfiles-doctor.out 2>&1; then
        echo " ok"
    else
        echo " failed"
        sed 's/^/  /' /tmp/dotfiles-doctor.out
        exit 1
    fi
}

check "brew bundle" brew bundle check --file={{config_root}}/Brewfile
check "stow available" command -v stow
check "mise available" command -v mise
check "mise tools installed" mise current
check "node version is 20.20.2" sh -c '[ "$(node -v)" = "v20.20.2" ]'
check "node ABI is 115" sh -c '[ "$(node -p process.versions.modules)" = "115" ]'
check "pi available" command -v pi
check "pi starts offline" pi --offline --list-models
check "git submodules initialized" git submodule status --recursive
check "zsh config linked" sh -c '[ -L "$HOME/.zshrc" ]'
check "mise config linked" sh -c '[ -L "$HOME/.config/mise/config.toml" ]'

if [ -f "$HOME/.pi/agent/env.local.zsh" ]; then
    check "pi env.local permissions" sh -c '[ "$(stat -f %Lp "$HOME/.pi/agent/env.local.zsh")" = "600" ]'
fi

if [ -f "$HOME/.claude/settings.local.json" ]; then
    check "claude settings.local permissions" sh -c '[ "$(stat -f %Lp "$HOME/.claude/settings.local.json")" = "600" ]'
fi

echo "dotfiles doctor passed"
"""

[tasks.install-omz]
description = "Install oh-my-zsh and third-party custom plugins (alias-tips, zsh-completions)"
depends = ["brew-install"]
run = """
set -e
ZSH_DIR="${ZSH:-$HOME/.oh-my-zsh}"
if [ ! -d "$ZSH_DIR" ]; then
    echo "Installing oh-my-zsh into $ZSH_DIR..."
    RUNZSH=no CHSH=no KEEP_ZSHRC=yes sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
else
    echo "oh-my-zsh already present at $ZSH_DIR"
fi
ZSH_CUSTOM_DIR="${ZSH_CUSTOM:-$ZSH_DIR/custom}"
for repo in djui/alias-tips zsh-users/zsh-completions; do
    name="${repo##*/}"
    dest="$ZSH_CUSTOM_DIR/plugins/$name"
    if [ ! -d "$dest" ]; then
        echo "Cloning $repo -> $dest"
        git clone --depth=1 "https://github.com/$repo" "$dest"
    else
        echo "Plugin $name already present"
    fi
done
echo "oh-my-zsh ready"
"""

[tasks.link]
description = "Stow all topics into $HOME"
depends = ["brew-install"]
run = "stow --dir={{config_root}} --target=$HOME --restow zsh nvim tmux ghostty gh-dash gh git mise claude pi eza marimo"

[tasks.unlink]
description = "Remove all stow symlinks"
run = "stow --dir={{config_root}} --target=$HOME --delete zsh nvim tmux ghostty gh-dash gh git mise claude pi eza marimo"

[tasks.update]
description = "Pull latest dotfiles, re-link, and update Pi packages"
run = "git -C {{config_root}} pull --rebase && mise run link && mise run pi-update"

[tasks.pi-update]
description = "Update Pi packages/extensions"
run = "pi update --extensions"

[tasks.brew-dump]
description = "Regenerate Brewfile (review and curate after running)"
run = "brew bundle dump --force --file={{config_root}}/Brewfile"

[tasks.submodule-update]
description = "Pull latest commits for all submodules (nvim, eza-themes)"
run = "git -C {{config_root}} submodule update --remote --merge"

[tasks.nvim-update]
description = "Update nvim to latest and commit the pointer"
run = """
  git -C {{config_root}} submodule update --remote --merge nvim/.config/nvim
  git -C {{config_root}} add nvim/.config/nvim
  git -C {{config_root}} commit -m "chore: update nvim to latest"
"""

[tasks.inject-secrets]
description = "Write 1Password secrets into live tool configs"
depends = ["brew-install"]
run = """
  JIRA_TOKEN=$(op read "op://Employee/JRamirez Atlassian API Token/API token")
  FIVETRAN_KEY=$(op read "op://Employee/JRamirez Fivetran API Key/username")
  FIVETRAN_SECRET=$(op read "op://Employee/JRamirez Fivetran API Key/password")
  LINEAR_API_KEY=$(op read "op://Employee/linear_api_key/API key")
  NOTION_API_KEY=""
  if [ -n "${NOTION_API_KEY_OP_REF:-}" ]; then
    NOTION_API_KEY=$(op read "$NOTION_API_KEY_OP_REF")
  fi

  mkdir -p ~/.claude
  jq -n --arg jira "$JIRA_TOKEN" \
     --arg fkey "$FIVETRAN_KEY" \
     --arg fsecret "$FIVETRAN_SECRET" \
     '{env: {JIRA_API_TOKEN: $jira, FIVETRAN_API_KEY: $fkey, FIVETRAN_API_SECRET: $fsecret}}' \
    > ~/.claude/settings.local.json
  chmod 600 ~/.claude/settings.local.json

  mkdir -p ~/.pi/agent
  cat > ~/.pi/agent/env.local.zsh <<EOF
export JIRA_API_TOKEN='$JIRA_TOKEN'
export FIVETRAN_API_KEY='$FIVETRAN_KEY'
export FIVETRAN_API_SECRET='$FIVETRAN_SECRET'
export LINEAR_API_KEY='$LINEAR_API_KEY'
export NOTION_API_KEY='$NOTION_API_KEY'
EOF
  chmod 600 ~/.pi/agent/env.local.zsh
"""
